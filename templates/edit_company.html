{% extends "base.html" %}

{% block content %}
<h1 class="mb-4">Edit Company</h1>

<form method="POST" action="/companies/edit/{{ company.company_id }}">
    <div class="mb-3">
        <label for="company_name" class="form-label">Company Name *</label>
        <input type="text" class="form-control" id="company_name" name="company_name"
               value="{{ company.company_name }}" required>
    </div>
    <div class="mb-3">
        <label for="industry" class="form-label">Industry</label>
        <input type="text" class="form-control" id="industry" name="industry"
               value="{{ company.industry or '' }}">
    </div>
    <div class="mb-3">
        <label for="website" class="form-label">Website</label>
        <input type="text" class="form-control" id="website" name="website"
               value="{{ company.website or '' }}">
    </div>
    <div class="row">
        <div class="col-md-6 mb-3">
            <label for="city" class="form-label">City</label>
            <input type="text" class="form-control" id="city" name="city"
                   value="{{ company.city or '' }}">
        </div>
        <div class="col-md-6 mb-3">
            <label for="state" class="form-label">State</label>
            <input type="text" class="form-control" id="state" name="state"
                   value="{{ company.state or '' }}">
        </div>
    </div>
    <div class="mb-3">
        <label for="notes" class="form-label">Notes</label>
        <textarea class="form-control" id="notes" name="notes" rows="3">{{ company.notes or '' }}</textarea>
    </div>
    <button type="submit" class="btn btn-primary">Save Changes</button>
    <a href="/companies" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
